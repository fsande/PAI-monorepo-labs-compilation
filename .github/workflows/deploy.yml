name: Deploy Projects to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Permite ejecutar manualmente

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build all projects
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          mkdir -p deploy
          
          # Build primer proyecto
          if [ -d "p09-funciones" ]; then
            echo "🔨 Building p09-funciones..."
            cd p09-funciones
            npm ci
            export BASE_URL="/$REPO_NAME/p09-funciones/"
            npm run build
            mkdir -p     "../../dist/p09-funciones"
            cp -r dist/* "../../dist/p09-funciones/"
            cd ../..
            echo "✅ p09-funciones built successfully"
          fi
          
          # Repetir para cada proyecto...

      - name: Create index page
        run: |
          cat > deploy/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Mis Proyectos</title>
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      min-height: 100vh;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      padding: 20px;
                  }
                  .container {
                      max-width: 900px;
                      width: 100%;
                  }
                  h1 {
                      color: white;
                      text-align: center;
                      margin-bottom: 40px;
                      font-size: 2.5em;
                      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
                  }
                  .projects {
                      display: grid;
                      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                      gap: 25px;
                  }
                  .project-card {
                      background: white;
                      border-radius: 15px;
                      padding: 30px;
                      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                      transition: transform 0.3s ease;
                      text-decoration: none;
                      color: inherit;
                      display: block;
                  }
                  .project-card:hover {
                      transform: translateY(-5px);
                      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
                  }
                  .project-icon {
                      font-size: 3em;
                      margin-bottom: 15px;
                  }
                  .project-name {
                      font-size: 1.5em;
                      font-weight: bold;
                      color: #333;
                      margin-bottom: 10px;
                  }
                  .project-description {
                      color: #666;
                      line-height: 1.6;
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>🚀 Portfolio de Proyectos</h1>
                  <div class="projects">
                      <a href="./p09-funciones/" class="project-card">
                          <div class="project-icon">🎮</div>
                          <div class="project-name">Mi Primer Proyecto</div>
                          <div class="project-description">Descripción del proyecto 1</div>
                      </a>
                      <!-- Añadir más proyectos aquí -->
                  </div>
              </div>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
