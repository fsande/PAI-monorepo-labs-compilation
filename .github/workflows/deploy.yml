name: Desplegar Monorepo en GitHub Pages
 
on:
  push:
    branches:
      - main       # Se ejecuta al hacer push a main
  workflow_dispatch:  # Permite ejecución manual
 
permissions:
  contents: read
  pages: write
  id-token: write
 
concurrency:
  group: pages
  cancel-in-progress: false
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
 
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
 
      - name: Instalar dependencias
        run: npm install
 
      - name: Construir todos los proyectos
        run: npm run build:all
 
      - name: Copiar index.html raíz al directorio dist
        run: cp index.html dist/index.html
 
      - name: Subir artefacto de GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
 
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
