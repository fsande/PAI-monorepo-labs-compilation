name: Deploy Projects to GitHub Pages - Fabián

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build all projects
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          mkdir -p deploy
          
          # Build 1-P09-Funciones
          if [ -d "p09-funciones" ]; then
            echo "🔨 Building P09 Funciones..."
            cd p09-funciones
            npm ci
            export BASE_URL="/$REPO_NAME/p09-funciones/"
            npm run build
            mkdir -p "../deploy/p09-funciones/"
            cp -r dist/* "../deploy/p09-funciones//"
            cd ../..
            echo "✅ p09-funciones built successfully"
          fi

          # Build 2-p10-proyectiles
          if [ -d "p10-proyectiles" ]; then
            echo "🔨 Building P10 Tiro Parabólico..."
            cd p10-proyectiles
            npm ci
            export BASE_URL="/$REPO_NAME/p10-proyectiles/"
            npm run build
            mkdir -p "../deploy/p10-proyectiles/"
            cp -r dist/* "../deploy/p10-proyectiles/"
            cd ../..
            echo "✅ p10-proyectiles built successfully"
          fi

          # Build 3-p11-lissajous
          if [ -d "p11-lissajous" ]; then
            echo "🔨 Building Lissajous..."
            cd p11-lissajous
            npm ci
            export BASE_URL="/$REPO_NAME/p11-lissajous/"
            npm run build
            mkdir -p "../deploy/p11-lissajous/"
            cp -r dist/* "../deploy/p11-lissajous//"
            cd ../..
            echo "✅ p11-lissajous built successfully"
          fi
         
          # Build 4-p12-hangman
          if [ -d "p12-hangman" ]; then
            echo "🔨 Building Hangman..."
            cd p12-hangman
            npm ci
            export BASE_URL="/$REPO_NAME/p12-hangman/"
            npm run build
            mkdir -p "../deploy/p12-hangman/"
            cp -r dist/* "../deploy/p12-hangman//"
            cd ../..
            echo "✅ p12-hangman built successfully"
          fi

          # Build 5-p12-MonteCarloIntegration
          if [ -d "p12-MonteCarloIntegration" ]; then
            echo "🔨 Building MonteCarlo Integration..."
            cd p12-MonteCarloIntegration
            npm ci
            export BASE_URL="/$REPO_NAME/p12-MonteCarloIntegration/"
            npm run build
            mkdir -p "../deploy/p12-MonteCarloIntegration/"
            cp -r dist/* "../deploy/p12-MonteCarloIntegration//"
            cd ../..
            echo "✅ p12-MonteCarloIntegration built successfully"
          fi

          # Build 6-platform-game
          if [ -d "platform-game" ]; then
            echo "🔨 Building the Platform Game..."
            cd platform-game
            npm ci
            export BASE_URL="/$REPO_NAME/platform-game/"
            npm run build
            mkdir -p "../deploy/platform-game/"
            cp -r dist/* "../deploy/platform-game//"
            cd ../..
            echo "✅ platform-game built successfully"
          fi

      - name: Create index page
        run: |
          cat > deploy/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Labs Compilation</title>
              <style>
                  * {
                      margin: 0;
                      padding: 0;
                      box-sizing: border-box;
                  }
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      min-height: 100vh;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      padding: 20px;
                  }
                  .container {
                      max-width: 800px;
                      width: 100%;
                  }
                  h1 {
                      color: white;
                      text-align: center;
                      margin-bottom: 40px;
                      font-size: 2.5em;
                      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
                  }
                  .projects {
                      display: grid;
                      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                      gap: 25px;
                  }
                  .project-card {
                      background: white;
                      border-radius: 15px;
                      padding: 30px;
                      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                      transition: transform 0.3s ease, box-shadow 0.3s ease;
                      text-decoration: none;
                      color: inherit;
                      display: block;
                  }
                  .project-card:hover {
                      transform: translateY(-5px);
                      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
                  }
                  .project-icon {
                      font-size: 3em;
                      margin-bottom: 15px;
                  }
                  .project-name {
                      font-size: 1.5em;
                      font-weight: bold;
                      color: #333;
                      margin-bottom: 10px;
                  }
                  .project-description {
                      color: #666;
                      line-height: 1.6;
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>🚀 PAI Labs Compilation</h1>
                  <div class="projects">
                      <a href="./p09-funciones/" class="project-card">
                          <div class="project-icon">🎮</div>
                          <div class="project-name">Funciones</div>
                          <div class="project-description">Representación de Funciones</div>
                      </a>

                      <a href="./p10-proyectiles/" class="project-card">
                          <div class="project-icon">🎮</div>
                          <div class="project-name">Proyectiles</div>
                          <div class="project-description">Tiro Parabólico</div>
                      </a>

                      <a href="./p11-lissajous/" class="project-card">
                          <div class="project-icon">🎮</div>
                          <div class="project-name">Lissajous</div>
                          <div class="project-description">Curvas de Lissajous</div>
                      </a>

                      <a href="./p12-hangman/" class="project-card">
                          <div class="project-icon">🎮</div>
                          <div class="project-name">Hangman</div>
                          <div class="project-description">The Hangman Game</div>
                      </a>

                      <a href="./p12-MonteCarloIntegration/" class="project-card">
                          <div class="project-icon">🎮</div>
                          <div class="project-name">Integration</div>
                          <div class="project-description">MonteCarlo Integration</div>
                      </a>

                      <a href="./platform-game/" class="project-card">
                          <div class="project-icon">🎮</div>
                          <div class="project-name">Game</div>
                          <div class="project-description">A Platform Game</div>
                      </a>
                  </div>
              </div>
          </body>
          </html>
          EOF

      - name: Copy root 404 page for SPA routing
        run: cp 404.html deploy/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
