name: Deploy Projects to GitHub Pages

# Upgrade GitHub Actions to latest major versions for Node 24
# https://github.com/neomjs/neo/issues/9600
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Permite ejecutar manualmente

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build all projects
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          mkdir -p deploy
          
          # Build primer proyecto
          if [ -d "p09-funciones" ]; then
            echo "🔨 Building p09-funciones..."
            cd p09-funciones
            npm ci
            export BASE_URL="/$REPO_NAME/p09-funciones/"
            npm run build
            #mkdir -p     "../../dist/p09-funciones"
            #cp -r dist/* "../../dist/p09-funciones/"
            #cd ../..
            echo "✅ p09-funciones built successfully"
          fi
          
          # Repetir para cada proyecto...

      - name: Create index page
        run: |
          cp index.html deploy/index.html
          # cat > deploy/index.html << 'EOF'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
